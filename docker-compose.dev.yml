services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: kibrary-dev:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-cache:/root/.cargo/registry
      - pnpm-store:/root/.local/share/pnpm/store
    network_mode: host
    tty: true
    stdin_open: true

volumes:
  cargo-cache:
  pnpm-store:
