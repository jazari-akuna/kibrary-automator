# Flatpak manifest for Kibrary
#
# Pragmatic build: assumes the Tauri release binary already exists at
# src-tauri/target/release/kibrary. Run `pnpm tauri build` once before
# building the Flatpak. This manifest just packages that binary plus
# desktop / metainfo files.
#
# For a Flathub-compliant offline build, this manifest will need a
# tarball release of the binary instead of a `dir:` source. Out of
# scope for the alpha.
#
# Build + install locally:
#   flatpak install --user flathub org.gnome.Platform//47 org.gnome.Sdk//47
#   flatpak-builder --user --force-clean --install build-dir flatpak/io.raph.kibrary.yml
#   flatpak run io.raph.kibrary
#
# Bundle into a single .flatpak file for distribution:
#   flatpak-builder --user --force-clean --repo=repo build-dir flatpak/io.raph.kibrary.yml
#   flatpak build-bundle repo io.raph.kibrary.flatpak io.raph.kibrary

app-id: io.raph.kibrary
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: kibrary

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri              # GPU acceleration for the WebKit renderer

  # Network — needed for search.raph.io and JLC2KiCadLib downloads
  - --share=network

  # Filesystem — user picks a workspace folder anywhere in $HOME
  - --filesystem=home

  # OS keychain access for storing the search.raph.io API key
  - --talk-name=org.freedesktop.secrets

  # KiCad handoff via flatpak-spawn from inside the sandbox
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: kibrary
    buildsystem: simple
    build-commands:
      - install -Dm755 src-tauri/target/release/kibrary /app/bin/kibrary
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.raph.kibrary.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/io.raph.kibrary.png
      - install -Dm644 flatpak/io.raph.kibrary.desktop /app/share/applications/io.raph.kibrary.desktop
      - install -Dm644 flatpak/io.raph.kibrary.metainfo.xml /app/share/metainfo/io.raph.kibrary.metainfo.xml

    sources:
      - type: dir
        path: ..
        skip:
          - target
          - node_modules
          - .git
          - .vite
          - dist
          - sidecar/.venv
          - sidecar/.build-venv
          - sidecar/dist
          - sidecar/build
